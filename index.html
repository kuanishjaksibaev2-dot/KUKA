<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title id="page-title">SAQ by Qundyz — Конные прогулки в Алматы</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet"/>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<style>
:root{
  --eg:#2d6a4f;--ed:#1b4332;--el:#40916c;
  --be:#faf9f0;--go:#d4af37;--gl:#e8cb5a;
  --br:#3e2723;--sl:#e8f4fd;
}
*{scroll-behavior:smooth;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--be);color:var(--br);overflow-x:hidden;margin:0;}
h1,h2,h3{font-family:'Playfair Display',serif;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:500;background:rgba(255,255,255,.94);backdrop-filter:blur(14px);border-bottom:1px solid rgba(212,175,55,.2);padding:.7rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:.8rem;flex-wrap:wrap;}
.nav-logo{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--ed);white-space:nowrap;}
.nav-logo span{color:var(--go);}
.nav-links{display:flex;gap:1.2rem;}
.nav-links a{font-size:.78rem;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--br);text-decoration:none;transition:color .2s;}
.nav-links a:hover{color:var(--eg);}
.nav-right{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;}

/* LANG */
.lang-sw{display:flex;gap:2px;background:rgba(45,106,79,.08);border-radius:50px;padding:3px;}
.lang-btn{border:none;background:none;cursor:pointer;font-size:.72rem;font-weight:700;padding:.28rem .65rem;border-radius:50px;color:var(--br);transition:all .2s;}
.lang-btn.on{background:var(--ed);color:#fff;}

/* ADMIN BTN */
.adm-btn{border:1.5px solid rgba(45,106,79,.3);background:none;border-radius:50px;padding:.3rem .8rem;font-size:.7rem;font-weight:700;color:var(--ed);cursor:pointer;transition:all .2s;white-space:nowrap;}
.adm-btn:hover{background:var(--ed);color:#fff;border-color:var(--ed);}

.nav-cta{background:var(--go);color:var(--br);padding:.42rem 1.1rem;border-radius:50px;font-size:.78rem;font-weight:700;text-decoration:none;white-space:nowrap;transition:background .2s,transform .2s;}
.nav-cta:hover{background:var(--gl);transform:translateY(-1px);}

/* HERO */
.hero{min-height:100vh;background:linear-gradient(135deg,rgba(27,67,50,.72),rgba(62,39,35,.5)),url('https://images.unsplash.com/photo-1551963831-b3b1ca40c98e?w=1600&q=80') center/cover no-repeat;display:flex;align-items:center;justify-content:center;text-align:center;position:relative;}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(to top,var(--be),transparent);}
.hero-inner{position:relative;z-index:1;padding:7rem 1.5rem 4rem;max-width:760px;margin:0 auto;}
.hero-badge{display:inline-block;background:rgba(212,175,55,.18);border:1px solid rgba(212,175,55,.5);color:#e8cb5a;font-size:.72rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;padding:.35rem 1rem;border-radius:50px;margin-bottom:1.5rem;}
.hero h1{font-size:clamp(2.8rem,8vw,5.5rem);font-weight:700;color:#fff;line-height:1.08;margin-bottom:1rem;text-shadow:0 2px 30px rgba(0,0,0,.3);}
.hero h1 em{color:var(--go);font-style:italic;}
.hero p{color:rgba(255,255,255,.88);font-size:clamp(1rem,2.5vw,1.2rem);max-width:520px;margin:0 auto 2.5rem;font-weight:300;line-height:1.65;}
.hero-stats{display:flex;gap:2.5rem;justify-content:center;margin-bottom:2.5rem;flex-wrap:wrap;}
.h-stat .num{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--go);display:block;}
.h-stat .lbl{font-size:.72rem;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.1em;}
.btn-gold{background:var(--go);color:var(--br);padding:.95rem 2.4rem;border-radius:50px;font-weight:700;font-size:.95rem;text-decoration:none;display:inline-block;box-shadow:0 4px 24px rgba(212,175,55,.35);transition:background .2s,transform .2s,box-shadow .2s;}
.btn-gold:hover{background:var(--gl);transform:translateY(-2px);box-shadow:0 8px 32px rgba(212,175,55,.45);}
.btn-ghost{border:2px solid rgba(255,255,255,.55);color:#fff;padding:.9rem 2rem;border-radius:50px;font-weight:500;font-size:.9rem;text-decoration:none;display:inline-block;margin-left:1rem;transition:all .2s;}
.btn-ghost:hover{border-color:#fff;background:rgba(255,255,255,.1);}

/* SECTION COMMONS */
.sec-eye{font-size:.7rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--go);display:block;margin-bottom:.5rem;}
.sec-title{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3rem);font-weight:700;color:var(--ed);line-height:1.15;margin-bottom:1rem;}
.gold-line{width:52px;height:3px;background:var(--go);border-radius:2px;margin:0 auto 2.5rem;}
.gold-line.l{margin:0 0 2.5rem;}
.wrap{max-width:1100px;margin:0 auto;padding:0 1.5rem;}

/* ABOUT */
.about-sec{background:#fff;padding:5rem 1.5rem;}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:center;}
.about-img-wrap{border-radius:1.5rem;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.12);position:relative;min-height:420px;}
.about-img-wrap img{width:100%;height:420px;object-fit:cover;display:block;}
.about-badge{position:absolute;bottom:1.5rem;left:1.5rem;background:var(--go);color:var(--br);padding:.6rem 1.2rem;border-radius:50px;font-weight:700;font-size:.85rem;}
.chip{display:inline-flex;align-items:center;gap:.4rem;background:var(--sl);border:1px solid rgba(184,216,240,.6);color:var(--ed);padding:.4rem .9rem;border-radius:50px;font-size:.78rem;font-weight:500;margin:.25rem;}

/* RIDE INCLUDED */
.ride-sec{background:var(--be);padding:5rem 1.5rem;}
.ride-card{background:#fff;border-radius:1.2rem;box-shadow:0 4px 24px rgba(0,0,0,.07);overflow:hidden;transition:transform .3s,box-shadow .3s;}
.ride-card:hover{transform:translateY(-6px);box-shadow:0 12px 40px rgba(0,0,0,.12);}
.ride-card img{width:100%;height:200px;object-fit:cover;display:block;}
.ride-card-body{padding:1.25rem;}
.ride-card-body h3{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:600;color:var(--ed);margin-bottom:.4rem;}
.ride-card-body p{font-size:.83rem;color:#666;line-height:1.55;}

/* SERVICES */
.svc-sec{background:var(--sl);padding:5rem 1.5rem;}
.price-card{background:#fff;border-radius:1.5rem;padding:2rem 1.5rem;box-shadow:0 8px 32px rgba(0,0,0,.07);position:relative;overflow:hidden;transition:transform .3s,box-shadow .3s;border:1px solid rgba(184,216,240,.4);}
.price-card:hover{transform:scale(1.04);box-shadow:0 20px 50px rgba(0,0,0,.13);}
.price-card.feat{background:linear-gradient(145deg,var(--ed),var(--eg));color:#fff;border:none;}
.price-card.feat h3,.price-card.feat .p-label,.price-card.feat .p-desc,.price-card.feat li{color:rgba(255,255,255,.88);}
.p-badge{position:absolute;top:1rem;right:1rem;background:var(--go);color:var(--br);font-size:.65rem;font-weight:700;padding:.2rem .7rem;border-radius:50px;text-transform:uppercase;}
.p-icon{font-size:2.2rem;margin-bottom:.75rem;}
.price-card h3{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:700;color:var(--ed);margin-bottom:.2rem;}
.p-label{font-size:.75rem;color:#888;text-transform:uppercase;letter-spacing:.08em;}
.p-amount{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:700;color:var(--go);line-height:1;margin:.75rem 0 .25rem;}
.p-desc{font-size:.8rem;color:#777;margin-bottom:1.2rem;}
.price-card ul{list-style:none;padding:0;margin:0 0 1.5rem;}
.price-card li{font-size:.82rem;color:#555;padding:.35rem 0;border-bottom:1px solid rgba(0,0,0,.05);display:flex;align-items:center;gap:.5rem;}
.price-card li::before{content:'✦';color:var(--go);font-size:.6rem;}
.btn-book{width:100%;padding:.8rem;background:var(--go);color:var(--br);border:none;border-radius:50px;font-weight:700;font-size:.88rem;cursor:pointer;text-decoration:none;display:block;text-align:center;transition:background .2s,transform .15s;}
.btn-book:hover{background:var(--gl);transform:translateY(-1px);}
.btn-book.out{background:transparent;border:2px solid rgba(255,255,255,.5);color:#fff;}
.btn-book.out:hover{background:rgba(255,255,255,.1);}

/* GALLERY */
.gal-sec{background:#fff;padding:5rem 1.5rem;}
.gal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;}
.gal-item{border-radius:1rem;overflow:hidden;aspect-ratio:4/3;position:relative;}
.gal-item.tall{grid-row:span 2;aspect-ratio:unset;}
.gal-item img{width:100%;height:100%;object-fit:cover;transition:transform .4s;display:block;}
.gal-item:hover img{transform:scale(1.07);}
.gal-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(27,67,50,.6),transparent);opacity:0;transition:opacity .3s;display:flex;align-items:flex-end;padding:1rem;}
.gal-item:hover .gal-ov{opacity:1;}
.gal-ov span{color:#fff;font-size:.78rem;font-weight:500;}

/* JOBS */
.jobs-sec{background:#fff;padding:5rem 1.5rem;}
.job-card{background:var(--be);border:1px solid rgba(212,175,55,.2);border-radius:1.2rem;overflow:hidden;transition:transform .3s,box-shadow .3s;}
.job-card:hover{transform:translateY(-4px);box-shadow:0 12px 36px rgba(0,0,0,.09);}
.job-card img{width:100%;height:200px;object-fit:cover;display:block;}
.job-card-body{padding:1.25rem;}
.job-card-body h3{font-family:'Playfair Display',serif;font-size:1rem;font-weight:600;color:var(--ed);margin-bottom:.3rem;}
.job-card-body p{font-size:.8rem;color:#666;line-height:1.5;}

/* CONTACT */
.contact-sec{background:linear-gradient(135deg,var(--ed),var(--eg));padding:5rem 1.5rem;}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:start;}
.form-card{background:rgba(255,255,255,.97);border-radius:2rem;padding:2.5rem 2rem;box-shadow:0 20px 60px rgba(0,0,0,.18);}
.f-label{font-size:.78rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ed);}
.f-input{width:100%;padding:.85rem 1.1rem;border:1.5px solid rgba(184,216,240,.6);border-radius:.75rem;font-family:'Inter',sans-serif;font-size:.9rem;color:var(--br);background:var(--sl);outline:none;transition:border-color .2s,box-shadow .2s;margin-top:.35rem;}
.f-input:focus{border-color:var(--eg);box-shadow:0 0 0 3px rgba(45,106,79,.12);background:#fff;}
.c-item{display:flex;align-items:center;gap:.75rem;color:rgba(255,255,255,.88);font-size:.9rem;margin-bottom:1rem;}
.c-icon{width:38px;height:38px;background:rgba(212,175,55,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
.soc-btn{display:inline-flex;align-items:center;gap:.5rem;padding:.65rem 1.3rem;border-radius:50px;font-size:.82rem;font-weight:600;text-decoration:none;transition:transform .2s,opacity .2s;}
.soc-btn:hover{transform:translateY(-2px);opacity:.9;}
.soc-wa{background:#25d366;color:#fff;}
.soc-ig{background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045);color:#fff;}
.soc-tt{background:#010101;color:#fff;}
.soc-2g{background:#1a8cff;color:#fff;}

/* FOOTER */
footer{background:var(--br);color:rgba(255,255,255,.75);text-align:center;padding:2rem;font-size:.8rem;}
footer a{color:var(--go);text-decoration:none;}

/* ADMIN PANEL */
#adm-panel{position:fixed;top:0;right:0;bottom:0;z-index:9999;width:360px;max-width:95vw;background:#fff;box-shadow:-4px 0 40px rgba(0,0,0,.18);display:flex;flex-direction:column;transform:translateX(110%);transition:transform .38s cubic-bezier(.4,0,.2,1);border-left:3px solid var(--go);}
#adm-panel.open{transform:translateX(0);}
.adm-hd{background:var(--ed);color:#fff;padding:1.1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.adm-hd h3{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;}
.adm-close{background:none;border:none;color:#fff;font-size:1.5rem;cursor:pointer;line-height:1;}
.adm-tabs{display:flex;flex-wrap:wrap;border-bottom:2px solid #eee;flex-shrink:0;}
.adm-tab{flex:1;min-width:55px;padding:.6rem .3rem;font-size:.68rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;border:none;background:none;cursor:pointer;color:#999;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;}
.adm-tab.on{color:var(--ed);border-bottom-color:var(--go);}
.adm-body{flex:1;overflow-y:auto;padding:1.25rem;}
.adm-sec{display:none;}
.adm-sec.on{display:block;}
.adm-f{margin-bottom:1rem;}
.adm-f label{display:block;font-size:.72rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--ed);margin-bottom:.3rem;}
.adm-f input,.adm-f textarea,.adm-f select{width:100%;padding:.55rem .8rem;border:1.5px solid #e0e0e0;border-radius:.6rem;font-size:.85rem;color:var(--br);background:#fafafa;outline:none;transition:border-color .2s;font-family:'Inter',sans-serif;}
.adm-f input:focus,.adm-f textarea:focus{border-color:var(--eg);background:#fff;}
.adm-f textarea{min-height:72px;resize:vertical;}
.adm-div{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--go);border-bottom:1px solid rgba(212,175,55,.25);padding-bottom:.4rem;margin:1.2rem 0 .8rem;}
.adm-ft{padding:1rem 1.25rem;border-top:1px solid #eee;display:flex;flex-direction:column;gap:.6rem;flex-shrink:0;}
.adm-abtn{width:100%;padding:.65rem;border-radius:.6rem;font-weight:700;font-size:.82rem;cursor:pointer;border:none;transition:all .2s;}
.adm-apply{background:var(--ed);color:#fff;} .adm-apply:hover{background:var(--eg);}
.adm-export{background:var(--go);color:var(--br);} .adm-export:hover{background:var(--gl);}
.adm-import{background:#f1f5f9;color:var(--br);border:1.5px solid #e0e0e0;}
.adm-reset{background:#fff0f0;color:#c0392b;border:1.5px solid #f5c6c6;}
.adm-music{background:var(--eg);color:#fff;} .adm-music:hover{background:var(--eg);}
.img-prev{width:100%;height:90px;object-fit:cover;border-radius:.5rem;margin-top:.4rem;display:none;border:1px solid #eee;}
.img-prev.show{display:block;}
#adm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:9998;display:none;opacity:0;transition:opacity .3s;}
#adm-overlay.show{display:block;opacity:1;}
#adm-toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ed);color:#fff;padding:.65rem 1.5rem;border-radius:50px;font-size:.82rem;font-weight:600;z-index:99999;transition:transform .35s,opacity .35s;opacity:0;pointer-events:none;white-space:nowrap;}
#adm-toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* MUSIC PLAYER */
#saq-player{position:fixed;bottom:1.4rem;left:1.4rem;z-index:8000;display:flex;align-items:center;gap:.7rem;background:rgba(27,67,50,.95);backdrop-filter:blur(18px);border:1px solid rgba(212,175,55,.45);border-radius:3rem;padding:.6rem .9rem .6rem .65rem;box-shadow:0 8px 32px rgba(0,0,0,.32);transition:max-width .42s cubic-bezier(.4,0,.2,1),border-radius .42s,padding .42s;max-width:340px;min-width:52px;overflow:hidden;user-select:none;}
#saq-player.closed{max-width:52px;padding:.65rem;border-radius:50%;}
#saq-player.closed .sp-body,#saq-player.closed .sp-right{display:none;}
#sp-main{width:36px;height:36px;border-radius:50%;border:none;background:var(--go);color:var(--br);font-size:1rem;font-weight:700;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(212,175,55,.45);transition:background .2s,transform .15s;}
#sp-main:hover{background:var(--gl);transform:scale(1.1);}
.sp-body{flex:1;min-width:0;}
.sp-title{font-size:.72rem;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px;}
.sp-meta{font-size:.6rem;color:rgba(212,175,55,.85);margin-top:1px;}
.sp-bar-wrap{width:100%;height:3px;background:rgba(255,255,255,.15);border-radius:2px;cursor:pointer;margin-top:5px;transition:height .15s;}
.sp-bar-wrap:hover{height:5px;}
.sp-bar{height:100%;width:0%;background:var(--go);border-radius:2px;transition:width .25s linear;}
.sp-right{display:flex;align-items:center;gap:.3rem;flex-shrink:0;}
.sp-ico{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.7);font-size:.85rem;padding:.25rem;transition:color .2s,transform .15s;line-height:1;}
.sp-ico:hover{color:var(--go);transform:scale(1.18);}
#sp-vol{width:52px;height:3px;accent-color:var(--go);cursor:pointer;border-radius:2px;}
.sp-eq{display:flex;align-items:flex-end;gap:2px;height:13px;}
.sp-eq span{display:block;width:3px;background:var(--go);border-radius:1px;}
.sp-eq span:nth-child(1){animation:speq .5s ease-in-out infinite alternate;}
.sp-eq span:nth-child(2){animation:speq .5s .18s ease-in-out infinite alternate;}
.sp-eq span:nth-child(3){animation:speq .5s .34s ease-in-out infinite alternate;}
@keyframes speq{0%{height:3px}100%{height:13px}}
.sp-eq.off span{animation:none;height:3px;}
#sp-hint{position:fixed;bottom:5.5rem;left:1.4rem;z-index:7999;background:rgba(27,67,50,.96);border:1px solid rgba(212,175,55,.4);border-radius:1rem;padding:.7rem 1rem;max-width:220px;font-size:.73rem;color:#fff;line-height:1.5;box-shadow:0 4px 20px rgba(0,0,0,.25);transition:opacity .5s,transform .5s;pointer-events:none;}
#sp-hint b{color:var(--go);}
#sp-hint.hide{opacity:0;transform:translateY(8px);}

/* RESPONSIVE */
@media(max-width:900px){.nav-links{display:none;}}
@media(max-width:768px){
  .about-grid{grid-template-columns:1fr!important;}
  .gal-grid{grid-template-columns:repeat(2,1fr);}
  .gal-item.tall{grid-row:span 1;aspect-ratio:4/3;}
  .form-card{padding:2rem 1.25rem;}
  .contact-grid{grid-template-columns:1fr!important;}
}
@media(max-width:480px){.btn-ghost{display:none;}}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <span class="nav-logo">SAQ <span>✦</span> by Qundyz</span>
  <div class="nav-links">
    <a href="#about" data-i18n="nav.about">О нас</a>
    <a href="#ride" data-i18n="nav.ride">Прогулка</a>
    <a href="#services" data-i18n="nav.svc">Услуги</a>
    <a href="#gallery" data-i18n="nav.gal">Галерея</a>
    <a href="#contact" data-i18n="nav.cnt">Контакты</a>
  </div>
  <div class="nav-right">
    <div class="lang-sw">
      <button class="lang-btn on" onclick="setLang('ru')">RU</button>
      <button class="lang-btn" onclick="setLang('kz')">KZ</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
    <button class="adm-btn" onclick="admOpen()">⚙️ <span data-i18n="adm.btn">Редактор</span></button>
    <a id="nav-wa" href="https://wa.me/77024175882" class="nav-cta" target="_blank">WhatsApp</a>
  </div>
</nav>

<!-- ADMIN OVERLAY -->
<div id="adm-overlay" onclick="admClose()"></div>

<!-- ADMIN PANEL -->
<div id="adm-panel">
  <div class="adm-hd">
    <h3>⚙️ Панель управления</h3>
    <button class="adm-close" onclick="admClose()">✕</button>
  </div>
  <div class="adm-tabs">
    <button class="adm-tab on" onclick="admTab('t-text')">📝 Тексты</button>
    <button class="adm-tab" onclick="admTab('t-contacts')">📞 Контакты</button>
    <button class="adm-tab" onclick="admTab('t-photos')">🖼 Фото</button>
    <button class="adm-tab" onclick="admTab('t-prices')">💰 Цены</button>
    <button class="adm-tab" onclick="admTab('t-music')">🎵 Музыка</button>
  </div>
  <div class="adm-body">

    <!-- TEXTS -->
    <div id="t-text" class="adm-sec on">
      <div class="adm-div">Hero секция</div>
      <div class="adm-f"><label>Заголовок строка 1</label><input id="a-h1" value="Конные прогулки"/></div>
